services:
  - type: web
    name: cogwheel-microbrain-api
    runtime: python
    plan: free
    rootDir: microbrain/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DATABASE_URL
        fromDatabase:
          name: cogwheel-microbrain-db
          property: connectionString
      - key: FRONTEND_ORIGINS
        sync: false
      - key: TAVILY_API_KEY
        sync: false

databases:
  - name: cogwheel-microbrain-db
    databaseName: cogwheel_microbrain
    plan: free
